<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="멀티에이전트 eval 배치">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0f13"/>
      <stop offset="1" stop-color="#161c26"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="150" y="360" fill="#f2f4f8" font-family="'Segoe UI', system-ui, sans-serif" font-size="188" font-weight="700" letter-spacing="-4">eval</text>
  <text x="158" y="436" fill="#8b94a3" font-family="'Segoe UI', system-ui, sans-serif" font-size="44" font-weight="500" letter-spacing="9">MULTI-AGENT PIPELINE</text>

  <!-- pipeline with per-step checks; final gate filled -->
  <g transform="translate(0 660)">
    <line x1="230" y1="0" x2="1370" y2="0" stroke="#3a4150" stroke-width="6"/>
    <g fill="#161c26" stroke="#f2f4f8" stroke-width="7">
      <circle cx="230" cy="0" r="30"/>
      <circle cx="515" cy="0" r="30"/>
      <circle cx="800" cy="0" r="30"/>
      <circle cx="1085" cy="0" r="30"/>
    </g>
    <g fill="#4db6a0" stroke="none">
      <circle cx="230" cy="0" r="11"/>
      <circle cx="515" cy="0" r="11"/>
      <circle cx="800" cy="0" r="11"/>
      <circle cx="1085" cy="0" r="11"/>
    </g>
    <!-- final gate -->
    <circle cx="1370" cy="0" r="42" fill="#4db6a0" stroke="#4db6a0"/>
    <path d="M1350 0 l14 15 l28 -32" fill="none" stroke="#0d0f13" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
