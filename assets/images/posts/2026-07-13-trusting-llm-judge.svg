<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="LLM-as-judge의 편향: 앞자리, 긴 답, 자기 계열을 편애하는 기울어진 저울">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0f13"/>
      <stop offset="1" stop-color="#161c26"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="150" y="232" fill="#8b94a3" font-family="'Segoe UI', system-ui, sans-serif" font-size="40" font-weight="500" letter-spacing="9">LLM-AS-JUDGE</text>
  <text x="146" y="380" fill="#f2f4f8" font-family="'Segoe UI', system-ui, sans-serif" font-size="150" font-weight="700" letter-spacing="-3">BIASED?</text>

  <!-- tilted balance: judge leans toward A (position bias) -->
  <g stroke-linecap="round">
    <!-- stand -->
    <line x1="800" y1="470" x2="800" y2="740" stroke="#3a4453" stroke-width="8"/>
    <path d="M700 740 L900 740 L860 700 L740 700 Z" fill="#3a4453"/>
    <!-- beam, tilted so left (A) is lower -->
    <line x1="560" y1="560" x2="1040" y2="460" stroke="#4db6a0" stroke-width="10"/>
    <circle cx="800" cy="510" r="14" fill="#4db6a0"/>
    <!-- left pan A (chosen: filled teal) -->
    <line x1="560" y1="560" x2="560" y2="620" stroke="#3a4453" stroke-width="6"/>
    <rect x="440" y="620" width="240" height="120" rx="18" fill="#2f5f56" stroke="#4db6a0" stroke-width="4"/>
    <!-- right pan B (outline only) -->
    <line x1="1040" y1="460" x2="1040" y2="520" stroke="#3a4453" stroke-width="6"/>
    <rect x="920" y="520" width="240" height="120" rx="18" fill="none" stroke="#5a6675" stroke-width="4"/>
  </g>
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="56" font-weight="700" text-anchor="middle">
    <text x="560" y="700" fill="#f2f4f8">A</text>
    <text x="1040" y="600" fill="#8b94a3">B</text>
  </g>
</svg>
