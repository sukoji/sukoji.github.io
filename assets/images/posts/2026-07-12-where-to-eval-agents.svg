<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="에이전트 평가의 세 무대">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0f13"/>
      <stop offset="1" stop-color="#161c26"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="150" y="232" fill="#8b94a3" font-family="'Segoe UI', system-ui, sans-serif" font-size="40" font-weight="500" letter-spacing="9">AGENT EVALUATION</text>
  <text x="146" y="380" fill="#f2f4f8" font-family="'Segoe UI', system-ui, sans-serif" font-size="150" font-weight="700" letter-spacing="-3">3 STAGES</text>

  <!-- three arenas: safe -> risky (teal outline, teal fill, warm fill) -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="34" font-weight="600" letter-spacing="4" text-anchor="middle">
    <rect x="150" y="560" width="380" height="150" rx="18" fill="none" stroke="#4db6a0" stroke-width="4"/>
    <text x="340" y="762" fill="#8b94a3">OFFLINE</text>

    <rect x="610" y="560" width="380" height="150" rx="18" fill="#2f5f56" stroke="#4db6a0" stroke-width="4"/>
    <text x="800" y="762" fill="#8b94a3">SHADOW</text>

    <rect x="1070" y="560" width="380" height="150" rx="18" fill="#8a4030" stroke="#e0805f" stroke-width="4"/>
    <text x="1260" y="762" fill="#8b94a3">PRODUCTION</text>
  </g>
</svg>
