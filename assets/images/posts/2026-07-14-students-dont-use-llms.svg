<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="engagement은 오르고 learning orientation은 내려가는 교차선">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0f13"/>
      <stop offset="1" stop-color="#161c26"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="150" y="232" fill="#8b94a3" font-family="'Segoe UI', system-ui, sans-serif" font-size="40" font-weight="500" letter-spacing="9">ACL 2026 · EDUCATIONAL NLP</text>
  <text x="146" y="380" fill="#f2f4f8" font-family="'Segoe UI', system-ui, sans-serif" font-size="140" font-weight="700" letter-spacing="-3">USAGE ≠ INTENT</text>

  <!-- diverging trends: engagement up, learning down (satisfaction-effectiveness inversion) -->
  <g>
    <line x1="200" y1="770" x2="1450" y2="770" stroke="#2a303b" stroke-width="3"/>
    <!-- engagement (teal), rising -->
    <polyline points="240,740 480,700 720,660 960,600 1200,560 1400,540" fill="none" stroke="#4db6a0" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="1400" cy="540" r="12" fill="#4db6a0"/>
    <!-- learning orientation (warm), falling -->
    <polyline points="240,560 480,590 720,630 960,690 1200,730 1400,752" fill="none" stroke="#e0805f" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="1400" cy="752" r="12" fill="#e0805f"/>
  </g>
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="30" font-weight="600" letter-spacing="3">
    <text x="1120" y="512" fill="#4db6a0">ENGAGEMENT ↑</text>
    <text x="1140" y="800" fill="#e0805f">LEARNING ↓</text>
  </g>
</svg>
