title: Seokho Jin
description: Multi-agent systems & human-centered AI — researcher, builder, writer.
url: "https://sukoji.github.io"
baseurl: ""
lang: ko

author:
  name: Seokho Jin
  name_ko: 진석호
  handle: sukoji
  email: tjrgh2192@postech.ac.kr
  avatar: "/assets/images/profile.jpg"
  location: Pohang, South Korea
  tagline: Multi-agent systems & human-centered AI
  bio_short: >
    PIAI 인턴. 멀티에이전트·eval 보고, sympo·token-stack repo 돌리는 중.
    Persode(ICES 2025)는 HCAC 때 했다.
  github: "https://github.com/sukoji"
  github_repos: "https://github.com/sukoji?tab=repositories"
  github_profile_readme: "https://github.com/sukoji/sukoji"
  github_site_source: "https://github.com/sukoji/sukoji.github.io"

markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

permalink: /blog/:year/:month/:day/:title/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - .editorconfig
  - docs/
  - _posts/_TEMPLATE.md