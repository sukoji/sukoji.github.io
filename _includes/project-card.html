<article class="project-card">
  <a class="project-preview" href="{{ include.project.url }}" target="_blank" rel="noopener noreferrer">
    <img
      src="{{ include.project.image }}"
      alt="{{ include.project.name }} 미리보기"
      loading="lazy"
      decoding="async"
    >
  </a>
  <div class="project-card-body">
    <div class="project-card-head">
      <h3 class="project-name">
        <a href="{{ include.project.url }}" target="_blank" rel="noopener noreferrer">{{ include.project.name }}</a>
      </h3>
      {% if include.project.stars %}
      <a class="project-stars" href="{{ include.project.url }}" target="_blank" rel="noopener noreferrer" title="GitHub stars">★ {{ include.project.stars }}</a>
      {% endif %}
    </div>
    <p class="project-desc">{{ include.project.desc }}</p>
    {% if include.project.tags %}
    <ul class="tag-list">
      {% for tag in include.project.tags %}
      <li>{{ tag }}</li>
      {% endfor %}
    </ul>
    {% endif %}
  </div>
</article>
