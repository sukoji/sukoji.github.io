---
layout: default
---
<article class="post">
  <header class="post-header">
    <p class="section-label">Blog · {{ page.date | date: '%Y.%m.%d' }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.tags and page.tags.size > 0 %}
    <ul class="tag-list">
      {% for tag in page.tags %}
      <li>{{ tag }}</li>
      {% endfor %}
    </ul>
    {% endif %}
  </header>
  <div class="post-content prose">
    {{ content }}
  </div>
  <footer class="post-footer">
    <a class="back-link" href="{{ '/blog/' | relative_url }}">← 모든 글</a>
  </footer>
</article>
