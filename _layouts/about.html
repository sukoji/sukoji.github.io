---
layout: default
---
<article class="page page-about">
  <header class="page-header reveal">
    <h1>{{ page.title }}</h1>
    {% if page.lead %}
    <p class="about-lead">{{ page.lead }}</p>
    {% endif %}
  </header>

  <div class="about-main prose page-content reveal">
    {{ content }}
  </div>
</article>
