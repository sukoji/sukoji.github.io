---
layout: default
---
<article class="page">
  {% if page.title != '홈' %}
  <header class="page-header reveal">
  {% if page.label %}
    <p class="section-label">{{ page.label }}</p>
  {% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
    <p class="page-subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </header>
  {% endif %}
  <div class="page-content reveal">
    {{ content }}
  </div>
</article>
