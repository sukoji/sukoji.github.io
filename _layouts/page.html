---
layout: default
---
<article class="page">
  {% if page.title != '홈' %}
  <header class="page-header">
    <p class="section-label">{% if page.label %}{{ page.label }}{% else %}Page{% endif %}</p>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
    <p class="page-subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </header>
  {% endif %}
  <div class="page-content">
    {{ content }}
  </div>
</article>
