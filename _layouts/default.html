<!DOCTYPE html>
<html lang="ko">
<head>
  {% include head.html %}
</head>
<body class="has-sidebar{% if page.layout == 'post' %} is-post{% endif %}{% if page.url == '/' %} is-home{% endif %}">
  <a class="skip-link" href="#main-content">본문으로 건너뛰기</a>
  {% if page.layout == 'post' %}
  <div class="reading-progress" aria-hidden="true"><span class="reading-progress-bar"></span></div>
  {% endif %}
  {% include header.html %}
  <main id="main-content" class="site-shell container{% if page.layout == 'post' %} is-post-shell{% endif %}{% if page.url == '/' %} is-home-shell{% endif %}">
    {% include site-sidebar.html %}
    <div class="site-main">
      {{ content }}
    </div>
  </main>
  {% include footer.html %}
</body>
</html>
