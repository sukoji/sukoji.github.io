<!DOCTYPE html>
<html lang="ko">
<head>
  {% include head.html %}
</head>
<body class="{% if page.layout == 'post' %}is-post{% endif %}{% if page.url == '/' %} is-home{% endif %}{% unless page.layout == 'home' or page.url == '/' %} has-sidebar{% endunless %}">
  <a class="skip-link" href="#main-content">본문으로 건너뛰기</a>
  {% if page.layout == 'post' %}
  <div class="reading-progress" aria-hidden="true"><span class="reading-progress-bar"></span></div>
  {% endif %}
  {% include header.html %}
  <main id="main-content" class="{% if page.layout == 'home' or page.url == '/' %}home-main{% else %}site-shell container{% if page.layout == 'post' %} is-post-shell{% endif %}{% endif %}">
    {% unless page.layout == 'home' or page.url == '/' %}
      {% include site-sidebar.html %}
      <div class="site-main">
        {{ content }}
      </div>
    {% else %}
      {{ content }}
    {% endunless %}
  </main>
  {% include footer.html %}
</body>
</html>
