<!DOCTYPE html>
<html lang="ko">
<head>
  {% include head.html %}
</head>
<body class="{% if page.layout == 'post' %}is-post{% endif %}{% if page.url == '/' %} is-home{% endif %}">
  <a class="skip-link" href="#main-content">본문으로 건너뛰기</a>
  {% if page.layout == 'post' %}
  <div class="reading-progress" aria-hidden="true"><span class="reading-progress-bar"></span></div>
  {% endif %}
  {% include header.html %}
  <main id="main-content" class="{% if page.layout == 'post' %}post-main{% elsif page.url != '/' %}container page-main{% endif %}">
    {{ content }}
  </main>
  {% include footer.html %}
</body>
</html>
